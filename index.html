<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HriZari Jewelry | Ръчно изработени гривни</title>
    <style>
        /* СТИЛОВЕ */
        body { font-family: 'Segoe UI', sans-serif; margin: 0; color: #333; background: #fff; }
        .hidden { display: none !important; }
        .promo-banner { background: #d4a373; color: #fff; text-align: center; padding: 10px; font-weight: bold; }
        .navbar { display: flex; justify-content: space-between; padding: 20px 5%; border-bottom: 1px solid #eee; }
        .nav-links { list-style: none; display: flex; gap: 20px; }
        .nav-links a { cursor: pointer; text-decoration: none; color: #333; font-weight: 500; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; padding: 50px 5%; }
        .product-card { border: 1px solid #eee; padding: 20px; text-align: center; border-radius: 10px; }
        .product-img { width: 100%; height: 250px; object-fit: cover; border-radius: 8px; cursor: pointer; }
        .buy-btn { background: #d4a373; color: white; border: none; padding: 12px 20px; cursor: pointer; border-radius: 5px; font-weight: bold; width: 100%; margin-top: 10px; }
        
        /* МОДАЛ */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); overflow-y: auto; }
        .modal-content { background: #fff; margin: 5% auto; padding: 25px; width: 90%; max-width: 450px; border-radius: 12px; position: relative; }
        .form-input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        .summary-box { background: #faf6f0; padding: 15px; border-radius: 8px; margin: 15px 0; }
        .summary-row { display: flex; justify-content: space-between; margin: 5px 0; }
    </style>
</head>
<body>

    <div class="promo-banner">✨ БЕЗПЛАТНА ДОСТАВКА НАД €30 | КОД: HRIZARI10 ЗА 10% ОТСТЪПКА ✨</div>
    
    <nav class="navbar">
        <div class="logo" style="font-size:24px; font-weight:bold;">HriZari Jewelry</div>
        <ul class="nav-links">
            <li><a onclick="showTab('home')">Home</a></li>
            <li><a onclick="showTab('bracelets')">Bracelets</a></li>
        </ul>
    </nav>

    <!-- ОСНОВНА СЕКЦИЯ -->
    <div id="tab-home">
        <div style="height:400px; display:flex; align-items:center; justify-content:center; text-align:center;">
            <div><h1>Ръчно изработена магия</h1><button onclick="showTab('bracelets')" class="buy-btn" style="width:auto;">Разгледай</button></div>
        </div>
    </div>

    <div id="tab-bracelets" class="hidden">
        <div class="products-grid">
            <div class="product-card">
                <img src="https://via.placeholder.com/250" class="product-img" onclick="openModal('Rainbow Bracelet', 7.50)">
                <h3>Rainbow Bracelet</h3>
                <p>€7.50</p>
                <button class="buy-btn" onclick="openModal('Rainbow Bracelet', 7.50)">Купи</button>
            </div>
        </div>
    </div>

    <!-- МОДАЛЕН ПРОЗОРЕЦ -->
    <div id="productModal" class="modal">
        <div class="modal-content">
            <span style="float:right; cursor:pointer; font-size:24px;" onclick="closeModal()">&times;</span>
            <h3 id="modal-title"></h3>
            <select id="bracelet-size" class="form-input">
                <option value="S">S (~16см)</option>
                <option value="M">M (~17см)</option>
            </select>
            <input type="number" id="product-qty" value="1" min="1" max="10" class="form-input" onchange="calculateTotal()">
            <label><input type="checkbox" id="gift-wrap" onchange="calculateTotal()"> Подаръчна кутия (+€1.50)</label>
            <input type="text" id="promo-code" class="form-input" placeholder="Промокод" onkeyup="applyPromoCode()">
            <p id="promo-message" style="font-size:12px;"></p>
            <input type="text" id="client-name" class="form-input" placeholder="Име и Фамилия">
            <input type="tel" id="client-phone" class="form-input" placeholder="Телефон">
            <input type="text" id="client-address" class="form-input" placeholder="Адрес / Офис">
            <select id="delivery-method" class="form-input" onchange="calculateTotal()">
                <option value="office">Офис Еконт (€3.00)</option>
                <option value="address">Адрес (€4.50)</option>
            </select>
            <div class="summary-box">
                <div class="summary-row"><span>Продукти:</span><span>€<span id="summary-products-price">0.00</span></span></div>
                <div id="discount-row" class="hidden summary-row"><span>Отстъпка:</span><span>-€<span id="summary-discount-amount">0.00</span></span></div>
                <div class="summary-row"><span>Доставка:</span><span id="summary-shipping-price">€3.00</span></div>
                <div class="summary-row" style="font-weight:bold; border-top:1px solid #ccc; padding-top:5px;"><span>Общо:</span><span>€<span id="summary-total-price">0.00</span></span></div>
            </div>
            <button class="buy-btn" onclick="sendOrderEmail()">Финализирай поръчката</button>
        </div>
    </div>

    <script>
        let selectedProductName = "", selectedProductPrice = 0, isDiscountApplied = false, discountPercentage = 0;

        function showTab(tab) {
            document.getElementById('tab-home').classList.toggle('hidden', tab !== 'home');
            document.getElementById('tab-bracelets').classList.toggle('hidden', tab !== 'bracelets');
        }

        function openModal(name, price) {
            selectedProductName = name; selectedProductPrice = price;
            document.getElementById('modal-title').innerText = name;
            document.getElementById('productModal').style.display = 'block';
            calculateTotal();
        }

        function closeModal() { document.getElementById('productModal').style.display = 'none'; }

        function applyPromoCode() {
            let code = document.getElementById('promo-code').value.trim().toUpperCase();
            let msg = document.getElementById('promo-message');
            if (code === "HRIZARI10") { isDiscountApplied = true; discountPercentage = 0.10; msg.innerText = "✓ 10% отстъпка"; msg.style.color = "#28a745"; }
            else { isDiscountApplied = false; msg.innerText = code === "" ? "" : "✗ Невалиден"; msg.style.color = "#dc3545"; }
            calculateTotal();
        }

        function calculateTotal() {
            let qty = parseInt(document.getElementById('product-qty').value) || 1;
            let productsPrice = selectedProductPrice * qty;
            let discount = isDiscountApplied ? productsPrice * discountPercentage : 0;
            let afterDiscount = productsPrice - discount;
            let gift = document.getElementById('gift-wrap').checked ? 1.50 : 0;
            let delivery = afterDiscount >= 30 ? 0 : (document.getElementById('delivery-method').value === 'office' ? 3.00 : 4.50);
            
            document.getElementById('summary-products-price').innerText = productsPrice.toFixed(2);
            document.getElementById('summary-discount-amount').innerText = discount.toFixed(2);
            document.getElementById('discount-row').classList.toggle('hidden', !isDiscountApplied);
            document.getElementById('summary-shipping-price').innerText = delivery === 0 ? "БЕЗПЛАТНА" : "€" + delivery.toFixed(2);
            document.getElementById('summary-total-price').innerText = (afterDiscount + gift + delivery).toFixed(2);
        }

        function sendOrderEmail() {
            let name = document.getElementById('client-name').value;
            let phone = document.getElementById('client-phone').value;
            let addr = document.getElementById('client-address').value;
            if(!name || !phone || !addr) { alert("Моля, попълни всички данни!"); return; }
            let body = `Поръчка за: ${selectedProductName}\nРазмер: ${document.getElementById('bracelet-size').value}\nИме: ${name}\nТелефон: ${phone}\nАдрес: ${addr}\nКрайна сума: €${document.getElementById('summary-total-price').innerText}`;
            window.location.href = `mailto:hrizarijewelry@gmail.com?subject=Нова поръчка&body=${encodeURIComponent(body)}`;
            closeModal();
        }
    </script>
</body>
</html>
